<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lista de Cursos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- DataTables CSS -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

</head>
<body>
  <div class="container-fluid mt-4">
    <div class="row">
      <!-- Filtros -->
      <div class="col-lg-3 col-md-4 mb-4">
        <div class="border p-3 rounded shadow-sm">
          <h5>Cursos</h5>
          <button class="btn btn-danger btn-sm mb-3 w-100">🧹 Clear Filters</button>

          <div class="mb-3">
            <label class="form-label">Search Courses</label>
            <input type="text" class="form-control" placeholder="Type to search courses...">
          </div>

          <div class="mb-3">
            <label class="form-label">Subject code</label>
            <select class="form-select">
              <option value="">Select...</option>
              <option>LAW</option>
              <option>BUS</option>
              <option>CS</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Course Category</label>
            <select class="form-select">
              <option selected>Law</option>
              <option>Business</option>
              <option>Computer Science</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Course Attributes</label>
            <select class="form-select">
              <option value="">Select...</option>
              <option>Online</option>
              <option>Hybrid</option>
              <option>In-person</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Tabla de resultados -->
      <div class="col-lg-9 col-md-8">
        <h4>Results (159)</h4>
        <a href="#" class="small text-decoration-none">📥 Export all results as CSV</a>
        <div class="table-responsive mt-3">
          <table id="coursesTable" class="table table-bordered table-striped">
            <thead class="table-light">
              <tr>
                <th>Curso</th>
                <th>Programa</th>
                <th>Crédito</th>
                <th>Facultad</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Administrative Law</td>
                <td>JD Program</td>
                <td>3</td>
                <td>Law School</td>
              </tr>
              <tr>
                <td>Adoption Law</td>
                <td>JD Program</td>
                <td>2</td>
                <td>Law School</td>
              </tr>
              <tr>
                <td>Advanced Creative Advocacy Lab</td>
                <td>JD Program</td>
                <td>2</td>
                <td>Law School</td>
              </tr>
              <tr>
                <td>Advanced Discovery</td>
                <td>JD Program</td>
                <td>3</td>
                <td>Law School</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap 5 JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <!-- DataTables JS -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

  <script>
    $(document).ready(function () {
      $('#coursesTable').DataTable({
        pageLength: 5,
        lengthChange: false,
        searching: true,
        ordering: true
      });
    });
  </script>
</body>
</html>
